version: '3.8'\n\nservices:\n  app:\n    image: your_app_image\n    restart: always\n    environment:\n      - YOUR_ENV_VAR=your_value\n      - ANOTHER_ENV_VAR=another_value\n    healthcheck:\n      test: ['CMD', 'curl', '-f', 'http://localhost:your_port']\n      interval: 30s\n      timeout: 10s\n      retries: 5\n\n  db:\n    image: your_db_image\n    restart: always\n    environment:\n      - DB_ENV_VAR=db_value\n    healthcheck:\n      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']\n      interval: 30s\n      timeout: 10s\n      retries: 5